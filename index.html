<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上上</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f4ef; color: #4a4540; font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; line-height: 1.7; -webkit-font-smoothing: antialiased; }

  /* ── Start overlay ── */
  .start-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: #f7f4ef;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.8s ease;
  }
  .start-overlay.hidden { opacity: 0; pointer-events: none; }
  .start-overlay .start-text {
    font-size: 1.1rem; color: #6a6560; letter-spacing: 0.1em;
    animation: breathe 2s ease-in-out infinite;
    border-bottom: 1px solid #d0cbc4; padding-bottom: 0.5rem;
  }
  @keyframes breathe { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* ── Main content ── */
  #main-content { display: none; }

  /* Desktop: split layout */
  @media (min-width: 769px) {
    html, body { height: 100%; overflow: hidden; }
    .split-desktop { display: flex; height: 100vh; overflow: hidden; }
    .hero-panel { flex: 1; overflow: hidden; background: #ebe6de; }
    .hero-panel img { width: 100%; height: 100%; object-fit: cover; }
    .content-panel { flex: 1; max-width: 520px; padding: 4rem 2.5rem 3rem; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; }
  }

  /* Mobile: stacked layout */
  @media (max-width: 768px) {
    html, body { height: auto; overflow: auto; }
    .split-desktop { display: block; }
    .hero-panel { height: 50vh; overflow: hidden; background: #ebe6de; }
    .hero-panel img { width: 100%; height: 100%; object-fit: cover; }
    .content-panel { padding: 2rem 1.2rem 3rem; max-width: 100%; }
    header h1 { font-size: 1.15rem; }
    .poem-en { font-size: 0.82rem; }
    .slideshow { aspect-ratio: 3/4; }
    .start-overlay .start-text { font-size: 1rem; }
    .music-btn { bottom: 1rem; right: 1rem; }
  }

  /* ── Shared ── */
  header { margin-bottom: 1.8rem; }
  header h1 { font-size: 1.3rem; font-weight: 500; color: #3a3530; letter-spacing: 0.06em; margin-bottom: 0.2rem; }
  header .dates { font-size: 0.8rem; color: #9a948e; letter-spacing: 0.06em; }
  .sep-line { width: 32px; height: 1px; background: #d0cbc4; }

  .note { margin: 1.8rem 0; }
  .poem-en { font-family: "Times New Roman", "Georgia", "Songti SC", serif; font-style: italic; font-size: 0.9rem; color: #5a5550; line-height: 2.3; letter-spacing: 0.03em; }
  .poem-attr { font-size: 0.75rem; color: #b0aaa4; margin-top: 1rem; }

  .slideshow-wrap { margin-top: 1.8rem; }
  .slideshow { position: relative; aspect-ratio: 4/3; border-radius: 4px; overflow: hidden; background: #ebe6de; cursor: pointer; }
  .slideshow img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.8s ease; }
  .slideshow img.active { opacity: 1; z-index: 1; }
  .slide-nav { position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(180,175,168,0.4); background: rgba(247,244,239,0.7); color: #a09890; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
  .slide-nav:hover { border-color: #4a4540; color: #4a4540; }
  .slide-prev { left: 0.5rem; } .slide-next { right: 0.5rem; }

  .music-btn { position: fixed; bottom: 1.5rem; right: 2rem; z-index: 100; width: 36px; height: 36px; border-radius: 50%; border: 1px solid #d0cbc4; background: rgba(247,244,239,0.92); color: #b0aaa4; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; backdrop-filter: blur(6px); }
  .music-btn:hover { border-color: #4a4540; color: #4a4540; }
  .music-btn.playing { border-color: #4a4540; color: #3a3530; animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(58,53,48,0.12); } 50% { box-shadow: 0 0 0 8px rgba(58,53,48,0); } }
</style>
</head>
<body>

<div class="start-overlay" id="start-overlay">
  <span class="start-text">轻触进入</span>
</div>

<div id="main-content">
  <div class="split-desktop">
    <div class="hero-panel">
      <img src="shangshang-fuji.jpg" alt="">
    </div>

    <div class="content-panel">
      <header>
        <h1>上上</h1>
        <p class="dates">2007.6.27 – 2026.6.15</p>
      </header>
      <div class="sep-line"></div>
      <div class="note">
        <p class="poem-en">The light, it doesn't stay.<br>It comes and goes.<br>That is you.<br>That is you.</p>
        <p class="poem-attr">&mdash; W.S. Merwin, <em>Rain Light</em></p>
      </div>
      <div class="sep-line"></div>

      <div class="slideshow-wrap" id="ss-wrap" style="display:none">
        <div class="slideshow" id="slideshow">
          <span class="slide-nav slide-prev"></span>
          <span class="slide-nav slide-next"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="music-btn" id="music-btn" title="音乐">♪</button>

<script>
var photos=["shangshang-first.jpg","shangshang-fourth.jpg","shangshang-second.jpg","shangshang-third.jpg","shangshang-fuji2.jpg","shangshang-ricoh.jpg","shangshang-sigma.jpg"];

var a=new Audio('satie.mp3');a.loop=true;a.volume=0.5;
a.addEventListener('ended',function(){a.currentTime=0;a.play()});
document.body.appendChild(a);

var mb=document.getElementById('music-btn');var playing=false;

function startAll() {
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('main-content').style.display='block';
  a.play().then(function(){mb.classList.add('playing');playing=true}).catch(function(){});
  initSlideshow();
  setTimeout(function(){var el=document.getElementById('start-overlay');if(el)el.remove()},800);
}

document.getElementById('start-overlay').addEventListener('click', startAll);
document.getElementById('start-overlay').addEventListener('touchend', function(e){e.preventDefault();startAll()});

mb.addEventListener('click',function(){
  if(playing){a.pause();mb.classList.remove('playing');playing=false}
  else{a.play();mb.classList.add('playing');playing=true}
});

function initSlideshow(){
  if(!photos.length)return;
  var ss=document.getElementById('slideshow'),wrap=document.getElementById('ss-wrap'),idx=0;
  wrap.style.display='block';
  photos.forEach(function(src,i){
    var img=document.createElement('img');img.src=src;img.loading=i<3?'eager':'lazy';
    if(i===0)img.classList.add('active');ss.appendChild(img);
  });
  var imgs=ss.querySelectorAll('img');
  function go(i){imgs[idx].classList.remove('active');idx=i;imgs[idx].classList.add('active')}
  function prev(){go((idx-1+photos.length)%photos.length)}
  function next(){go((idx+1)%photos.length)}
  ss.querySelector('.slide-prev').onclick=function(e){e.stopPropagation();prev()};
  ss.querySelector('.slide-next').onclick=function(e){e.stopPropagation();next()};
  var ap=setInterval(function(){next()},4000);
  ss.addEventListener('mouseenter',function(){clearInterval(ap)});
  ss.addEventListener('mouseleave',function(){ap=setInterval(function(){next()},4000)});
  document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
  var tx=0;ss.addEventListener('touchstart',function(e){tx=e.touches[0].clientX});ss.addEventListener('touchend',function(e){var dx=tx-e.changedTouches[0].clientX;if(Math.abs(dx)>50){if(dx>0)next();else prev()}});
}
</script>
</body>
</html>
