<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preload" as="image" href="shangshang-fuji.jpg">
<title>上上</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f4ef; color: #4a4540; font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif; line-height: 1.7; -webkit-font-smoothing: antialiased; }

  /* ── Start overlay ── */
  .start-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: #f7f4ef;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.8s ease;
  }
  .start-overlay.hidden { opacity: 0; pointer-events: none; }
  .start-overlay .start-text {
    font-size: 1.1rem; color: #6a6560; letter-spacing: 0.1em;
    animation: breathe 2s ease-in-out infinite;
    border-bottom: 1px solid #d0cbc4; padding-bottom: 0.5rem;
  }
  @keyframes breathe { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  .cat-icon { margin-top: 1.2rem; animation: catBounce 2s ease-in-out infinite; }
  @keyframes catBounce { 0%,100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-4px); opacity: 0.9; } }

  /* ── Main content ── */
  #main-content { display: none; }

  /* Desktop: split layout */
  @media (min-width: 769px) {
    html, body { height: 100%; overflow: hidden; }
    .split-desktop { display: flex; height: 100vh; overflow: hidden; }
    .hero-panel { flex: 1; overflow: hidden; background: #ebe6de; padding: 2rem; display: flex; align-items: center; justify-content: center; }
    .hero-panel img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 3px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    .content-panel { flex: 1; min-height: 0; max-width: 520px; padding: 4rem 2.5rem 3rem; overflow-y: auto; }
  }

  /* Mobile: stacked layout */
  @media (max-width: 768px) {
    html, body { height: auto; overflow: auto; }
    .split-desktop { display: block; }
    .hero-panel { height: 50vh; overflow: hidden; background: #ebe6de; padding: 1.2rem; display: flex; align-items: center; justify-content: center; }
    .hero-panel img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 3px; }
    .content-panel { padding: 2rem 1.2rem 3rem; max-width: 100%; }
    header h1 { font-size: 1.15rem; }
    .poem-en { font-size: 0.82rem; }
    .film-frame { flex: 0 0 100% !important; width: 100% !important; min-width: 100% !important; aspect-ratio: 4/3 !important; }
    .film-strip { scroll-snap-type: x mandatory !important; overflow-x: auto; }
    .film-reel { padding: 16px 0 12px; }
    .film-reel::before { height: 16px; }
    .film-reel::after { height: 12px; }
    .start-overlay .start-text { font-size: 1rem; }
    .music-btn { bottom: 1rem; right: 1rem; }
  }

  /* ── Shared ── */
  header { margin-bottom: 1.8rem; }
  header h1 { font-size: 1.3rem; font-weight: 500; color: #3a3530; letter-spacing: 0.06em; margin-bottom: 0.2rem; }
  header .dates { font-size: 0.8rem; color: #9a948e; letter-spacing: 0.06em; }
  .sep-line { width: 32px; height: 1px; background: #d0cbc4; }

  .note { margin: 1.8rem 0; }
  .poem-en { font-family: "Times New Roman", "Georgia", "Songti SC", serif; font-style: italic; font-size: 0.9rem; color: #5a5550; line-height: 2.3; letter-spacing: 0.03em; }
  .poem-attr { font-size: 0.75rem; color: #b0aaa4; margin-top: 1rem; }

  .slideshow-wrap { margin-top: 1.8rem; overflow: hidden; flex-shrink: 0; }
  .film-reel {
    position: relative;
    background: #1a1512;
    padding: 22px 0 18px;
    overflow: hidden;
    border-radius: 2px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.3);
  }
  .film-reel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 22px;
    z-index: 3; pointer-events: none;
    background:
      repeating-linear-gradient(90deg,
        transparent 0px, transparent 11px,
        #0d0a08 11px, #0d0a08 15px,
        transparent 15px, transparent 18px,
        #0d0a08 18px, #0d0a08 22px,
        transparent 22px, transparent 29px,
        #0d0a08 29px, #0d0a08 33px
      );
    opacity: 0.85;
    mask-image: linear-gradient(180deg, #000 0%, #000 60%, transparent 100%);
    -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 60%, transparent 100%);
  }
  .film-reel::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 18px;
    z-index: 3; pointer-events: none;
    background:
      repeating-linear-gradient(90deg,
        transparent 0px, transparent 13px,
        #0d0a08 13px, #0d0a08 17px,
        transparent 17px, transparent 20px,
        #0d0a08 20px, #0d0a08 24px,
        transparent 24px, transparent 31px,
        #0d0a08 31px, #0d0a08 35px
      );
    opacity: 0.8;
    mask-image: linear-gradient(0deg, #000 0%, #000 60%, transparent 100%);
    -webkit-mask-image: linear-gradient(0deg, #000 0%, #000 60%, transparent 100%);
  }
  .film-grain {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.06'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    opacity: 0.5; mix-blend-mode: overlay;
  }
  .film-scratches {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      linear-gradient(180deg, transparent 0%, transparent 30%, rgba(255,255,255,0.02) 30%, transparent 31%,
        transparent 55%, rgba(255,255,255,0.015) 55%, transparent 56%,
        transparent 78%, rgba(255,255,255,0.02) 78%, transparent 79%);
    animation: scratchMove 8s linear infinite;
  }
  @keyframes scratchMove {
    0% { background-position: 0 0; }
    100% { background-position: 0 200px; }
  }
  .film-strip {
    display: flex; gap: 0;
    position: relative; z-index: 1;
    overflow: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none; -ms-overflow-style: none;
    margin: 0 3px;
  }
  .film-strip::-webkit-scrollbar { display: none; }
  .film-frame {
    flex: 0 0 100%; width: 100%; min-width: 100%; height: auto;
    aspect-ratio: 4/3;
    scroll-snap-align: center; scroll-snap-stop: always;
    overflow: hidden;
    position: relative;
  }
  .film-frame::after {
    content: '';
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.3), inset 0 0 8px rgba(255,220,180,0.05);
  }
  .film-frame img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: sepia(0.15) contrast(0.9) brightness(0.9) saturate(0.85);
    transition: filter 0.5s ease;
  }
  .film-frame:hover img {
    filter: sepia(0.05) contrast(1) brightness(1) saturate(1);
  }
  .film-nav {
    display: flex; justify-content: center; gap: 1rem;
    margin-top: 0.8rem;
  }
  .film-nav button {
    background: none; border: 1px solid #d0cbc4;
    color: #a09890; font-size: 0.9rem; cursor: pointer;
    padding: 4px 14px; border-radius: 2px;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .film-nav button:hover { border-color: #4a4540; color: #4a4540; }

  .music-btn { position: fixed; bottom: 1.5rem; right: 2rem; z-index: 100; width: 36px; height: 36px; border-radius: 50%; border: 1px solid #d0cbc4; background: rgba(247,244,239,0.92); color: #b0aaa4; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; backdrop-filter: blur(6px); }
  .music-btn:hover { border-color: #4a4540; color: #4a4540; }
  .music-btn.playing { border-color: #4a4540; color: #3a3530; animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(58,53,48,0.12); } 50% { box-shadow: 0 0 0 8px rgba(58,53,48,0); } }

  /* ── Guestbook ── */
  .guestbook-wrap {
    margin-top: 2.2rem; border-top: 1px solid #e5e1da; padding-top: 1.8rem;
    flex-shrink: 0;
  }
  .guestbook-wrap h2 {
    font-size: 0.85rem; font-weight: 500; color: #8a8580;
    letter-spacing: 0.08em; margin-bottom: 1rem;
  }
  .gb-form { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.4rem; }
  .gb-form textarea {
    width: 100%; min-height: 68px; padding: 10px 12px;
    border: 1px solid #dcd7ce; border-radius: 2px; background: #fafaf7;
    color: #4a4540; font-family: inherit; font-size: 0.85rem; line-height: 1.6;
    resize: vertical; transition: border-color 0.3s; outline: none;
  }
  .gb-form textarea:focus { border-color: #b0aaa4; }
  .gb-form textarea::placeholder { color: #c5c0b8; }
  .gb-row { display: flex; align-items: center; gap: 0.5rem; }
  .gb-submit {
    padding: 5px 18px; border: 1px solid #b0aaa4; border-radius: 2px;
    background: transparent; color: #8a8580; font-family: inherit;
    font-size: 0.8rem; cursor: pointer; transition: all 0.3s;
    letter-spacing: 0.04em; white-space: nowrap;
  }
  .gb-submit:hover { border-color: #4a4540; color: #4a4540; }
  .gb-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .gb-hint { font-size: 0.72rem; color: #c5c0b8; }
  .gb-thanks { font-size: 0.75rem; color: #7a9580; margin-top: 0.3rem; display: none; }
  .gb-error { font-size: 0.75rem; color: #c07060; margin-top: 0.3rem; display: none; }
  .gb-msgs {
    display: flex; flex-direction: column; gap: 0.8rem;
    max-height: 320px; overflow-y: auto; padding-right: 4px;
  }
  .gb-msgs::-webkit-scrollbar { width: 4px; }
  .gb-msgs::-webkit-scrollbar-thumb { background: #ddd8d0; border-radius: 2px; }
  .gb-msg { padding: 6px 0; border-bottom: 1px solid #f0ede7; }
  .gb-msg:last-child { border-bottom: none; }
  .gb-msg p { font-size: 0.82rem; line-height: 1.6; color: #4a4540; }
  .gb-msg .gb-meta { font-size: 0.7rem; color: #b5b0a8; margin-top: 2px; }
  .gb-empty { font-size: 0.8rem; color: #c5c0b8; text-align: center; padding: 1.2rem 0; }
  .gb-loading { font-size: 0.78rem; color: #c5c0b8; text-align: center; padding: 1rem 0; }
</style>

<script>
var photos=["shangshang-first.jpg","shangshang-fourth.jpg","shangshang-second.jpg","shangshang-third.jpg","shangshang-fuji2.jpg","shangshang-ricoh.jpg","shangshang-sigma.jpg","shangshang-canon2.jpg","shangshang-canon3.jpg","shangshang-canon4.jpg","shangshang-canon5.jpg","shangshang-wx1.jpg"];

var a=null;
function initAudio(){
  if(a)return;
  a=document.createElement('audio');a.src='satie.mp3';a.preload='auto';a.loop=true;a.volume=0.5;
  a.addEventListener('ended',function(){a.currentTime=0;a.play()});
  document.body.appendChild(a);a.load();
}

var mb=document.getElementById('music-btn');var playing=false;

function startAll() {
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('main-content').style.display='block';
  initSlideshow();
  initGuestbook();
  initAudio();
  var playPromise=a.play();
  if(playPromise!==undefined){
    playPromise.then(function(){mb.classList.add('playing');playing=true}).catch(function(e){
      console.log('play failed:',e);
      setTimeout(function(){a.play().then(function(){mb.classList.add('playing');playing=true}).catch(function(){})},300);
    });
  }
  setTimeout(function(){var el=document.getElementById('start-overlay');if(el)el.remove()},800);
}

document.getElementById('start-overlay').addEventListener('click', startAll);
document.getElementById('start-overlay').addEventListener('touchend', function(e){e.preventDefault();startAll()});

mb.addEventListener('click',function(){
  if(!a){initAudio()}
  if(playing){a.pause();mb.classList.remove('playing');playing=false}
  else{a.play();mb.classList.add('playing');playing=true}
});

function initSlideshow(){
  if(!photos.length)return;
  var strip=document.getElementById('film-strip'),wrap=document.getElementById('ss-wrap');
  wrap.style.display='block';
  photos.forEach(function(src,i){
    var frame=document.createElement('div');frame.className='film-frame';
    var img=document.createElement('img');img.src=src;img.loading='eager';
    frame.appendChild(img);strip.appendChild(frame);
  });
  var clone=document.createElement('div');clone.className='film-frame';
  var cloneImg=document.createElement('img');cloneImg.src=photos[0];cloneImg.loading='eager';
  clone.appendChild(cloneImg);strip.appendChild(clone);
  var ap=setInterval(function(){filmNext()},4500);
  strip.addEventListener('mouseenter',function(){clearInterval(ap)});
  strip.addEventListener('mouseleave',function(){ap=setInterval(function(){filmNext()},4500)});
  document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')filmPrev();if(e.key==='ArrowRight')filmNext()});
}

var filmIdx=0,scrollAnim=null;
function smoothScrollTo(target){
  var s=document.getElementById('film-strip');if(!s)return;
  if(scrollAnim)cancelAnimationFrame(scrollAnim);
  var start=s.scrollLeft,end=target;
  var duration=600,startTime=null;
  function step(t){
    if(!startTime)startTime=t;
    var p=Math.min((t-startTime)/duration,1);
    var ease=p<0.5?2*p*p:-1+(4-2*p)*p;
    s.scrollLeft=start+(end-start)*ease;
    if(p<1)scrollAnim=requestAnimationFrame(step);
    else scrollAnim=null;
  }
  scrollAnim=requestAnimationFrame(step);
}
function filmPrev(){
  var s=document.getElementById('film-strip');if(!s)return;
  filmIdx=Math.max(0,filmIdx-1);
  var f=s.children[filmIdx];
  if(f)smoothScrollTo(f.offsetLeft);
}
function filmNext(){
  var s=document.getElementById('film-strip');if(!s)return;
  filmIdx++;
  if(filmIdx>=photos.length){
    s.scrollTo({left:0,behavior:'instant'});
    filmIdx=0;
    setTimeout(function(){filmIdx=1;if(s.children[1])smoothScrollTo(s.children[1].offsetLeft)},500);
    return;
  }
  var f=s.children[filmIdx];
  if(f)smoothScrollTo(f.offsetLeft);
}

var fbConfig = {
  apiKey: "AIzaSyAateJ5Dw4re7FDLZ-aV-006i5dNeFp6zs",
  authDomain: "shangshang-guestbook.firebaseapp.com",
  projectId: "shangshang-guestbook",
  storageBucket: "shangshang-guestbook.firebasestorage.app",
  messagingSenderId: "78589013498",
  appId: "1:78589013498:web:1598ccd365efee85c54843"
};

var gbReady = false;
var gbDb = null;
var gbLastSubmit = 0;

function initGuestbook() {
  document.getElementById('gb-wrap').style.display = 'block';

  // Check if Firebase is configured
  if (fbConfig.apiKey === 'YOUR_API_KEY') {
    document.getElementById('gb-msgs').innerHTML =
      '<div class="gb-empty">留言板等待配置</div>';
    return;
  }

  // Dynamic load Firebase SDKs only when config is set
  loadFirebaseSDK().then(function() {
    initFirebase();
  }).catch(function(e) {
    document.getElementById('gb-msgs').innerHTML =
      '<div class="gb-empty">留言板暂不可用</div>';
    console.error('Firebase SDK load error:', e);
  });
}

function loadFirebaseSDK() {
  return new Promise(function(resolve, reject) {
    var scripts = [
      'https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js',
      'https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js',
      'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js'
    ];
    var loaded = 0;
    var failed = false;
    scripts.forEach(function(src) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = function() {
        if (failed) return;
        loaded++;
        if (loaded === scripts.length) resolve();
      };
      s.onerror = function() {
        if (failed) return;
        failed = true;
        reject(new Error('Failed to load: ' + src));
      };
      document.head.appendChild(s);
    });
  });
}

function initFirebase() {
  try {
    firebase.initializeApp(fbConfig);
    firebase.auth().signInAnonymously().then(function() {
      gbDb = firebase.firestore();
      gbReady = true;
      loadMessages();
    }).catch(function(e) {
      document.getElementById('gb-msgs').innerHTML =
        '<div class="gb-empty">留言板暂不可用</div>';
      console.error('Firebase auth error:', e);
    });
  } catch(e) {
    document.getElementById('gb-msgs').innerHTML =
      '<div class="gb-empty">留言板暂不可用</div>';
    console.error('Firebase init error:', e);
  }
}

function loadMessages() {
  if (!gbDb) return;
  gbDb.collection('messages').orderBy('createdAt', 'desc').limit(50).get()
    .then(function(snap) {
      var container = document.getElementById('gb-msgs');
      if (snap.empty) {
        container.innerHTML = '<div class="gb-empty">还没有留言，写第一条吧</div>';
        return;
      }
      var html = '';
      snap.forEach(function(doc) {
        var d = doc.data();
        var ts = d.createdAt ? d.createdAt.toDate() : new Date();
        var timeStr = ts.getFullYear() + '.' + (ts.getMonth()+1) + '.' + ts.getDate()
                    + ' ' + String(ts.getHours()).padStart(2,'0') + ':' + String(ts.getMinutes()).padStart(2,'0');
        var text = escapeHtml(d.text || '');
        html += '<div class="gb-msg"><p>' + text + '</p><span class="gb-meta">' + timeStr + '</span></div>';
      });
      container.innerHTML = html;
    }).catch(function(e) {
      document.getElementById('gb-msgs').innerHTML =
        '<div class="gb-empty">留言加载失败</div>';
      console.error('Firestore read error:', e);
    });
}

function gbSend() {
  var textEl = document.getElementById('gb-text');
  var errEl = document.getElementById('gb-error');
  var thanksEl = document.getElementById('gb-thanks');
  var btn = document.getElementById('gb-send');
  var text = textEl.value.trim();
  errEl.style.display = 'none';
  thanksEl.style.display = 'none';

  if (!text) {
    errEl.textContent = '请写点什么';
    errEl.style.display = 'block';
    return;
  }
  if (text.length > 500) {
    errEl.textContent = '最多500字';
    errEl.style.display = 'block';
    return;
  }
  if (!gbReady || !gbDb) {
    errEl.textContent = '留言板未就绪，请稍后再试';
    errEl.style.display = 'block';
    return;
  }
  // Rate limit: 30 seconds
  var now = Date.now();
  if (now - gbLastSubmit < 30000) {
    errEl.textContent = '请稍等片刻再发送';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  gbDb.collection('messages').add({
    text: text,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    gbLastSubmit = Date.now();
    textEl.value = '';
    thanksEl.style.display = 'block';
    btn.disabled = false;
    loadMessages();
    setTimeout(function() { thanksEl.style.display = 'none'; }, 3000);
  }).catch(function(e) {
    errEl.textContent = '发送失败，请重试';
    errEl.style.display = 'block';
    btn.disabled = false;
    console.error('Firestore write error:', e);
  });
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
